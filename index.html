<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign-up Form</title> 
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sidebar-container">
        <img class="bg-image" src="image/picture.jpg" alt="Fern background">
        <div class="logo-overlay">
            <img src="image/odin-lined.png" alt="Odin Logo">
            <span class="logo-text">ODIN</span>
        </div>
    </div>

    <div class="right-section">
        <div class="header-text">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. <br>Sign up <em>now</em> to get started.</p>
            <p>You <em>know</em> you want to.</p>
        </div>

        <div class="form-container">
            <form id="signup-form">
                <h2 class="form-title">Let's do this!</h2>
                <div class="user-details">
                    <div class="input-box">
                        <label for="first_name">FIRST NAME</label>
                        <input type="text" id="first_name" name="first_name">
                    </div>
                    <div class="input-box">
                        <label for="last_name">LAST NAME</label>
                        <input type="text" id="last_name" name="last_name">
                    </div>
                    <div class="input-box">
                        <label for="email">EMAIL</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="input-box">
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" id="phone" name="phone">
                    </div>
                    <div class="input-box">
                        <label for="password">PASSWORD</label>
                        <input type="password" id="password" name="password" required class="error">
                    </div>
                    <div class="input-box">
                        <label for="confirm_password">CONFIRM PASSWORD</label>
                        <input type="password" id="confirm_password" name="confirm_password" required class="error">
                    </div>
                </div>
            </form>
        </div>

        <div class="footer-section">
            <button type="submit" form="signup-form">Create Account</button>
            <p>Already have an account? <a href="#">Log in</a></p>
        </div>
    </div>
</body>
</html>
